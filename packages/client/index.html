<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowserStrike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #game { display: block; width: 100%; height: 100%; }
    #game { display: none; }
    #ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #ui-root > * { pointer-events: auto; }
    .screen {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
    }

    /* Menu panel */
    .menu-panel {
      width: 360px; padding: 40px 32px;
      background: #16213e; border-radius: 12px;
      border: 1px solid #0f3460;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 12px;
    }
    .menu-title {
      font-size: 2rem; font-weight: 700; text-align: center;
      color: #ff6b00; letter-spacing: 2px; margin-bottom: 0;
    }
    .menu-subtitle {
      font-size: 0.85rem; text-align: center;
      color: #666; margin-bottom: 8px;
    }
    .menu-label {
      font-size: 0.8rem; color: #888; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .menu-input {
      width: 100%; padding: 10px 14px;
      background: #0f3460; border: 1px solid #1a4a7a;
      border-radius: 6px; color: #e0e0e0;
      font-size: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    .menu-input:focus { border-color: #ff6b00; }
    .menu-input::placeholder { color: #555; }
    .menu-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-btn {
      padding: 12px 20px; border: none; border-radius: 6px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    .menu-btn:active { transform: scale(0.97); }
    .menu-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .menu-btn-primary {
      background: #ff6b00; color: #fff;
    }
    .menu-btn-primary:hover:not(:disabled) { background: #e65e00; }
    .menu-btn-secondary {
      background: #0f3460; color: #ccc; border: 1px solid #1a4a7a;
      flex-shrink: 0; padding: 10px 20px;
    }
    .menu-btn-secondary:hover:not(:disabled) { background: #163d6f; }
    .menu-divider {
      display: flex; align-items: center; gap: 12px;
      color: #555; font-size: 0.8rem; margin: 4px 0;
    }
    .menu-divider::before, .menu-divider::after {
      content: ''; flex: 1; height: 1px; background: #0f3460;
    }
    .menu-join-row {
      display: flex; gap: 8px;
    }
    .menu-code-input {
      flex: 1; text-align: center; font-size: 1.1rem;
      letter-spacing: 3px; font-weight: 600;
    }
    .menu-error {
      display: none; padding: 8px 12px;
      background: rgba(255,60,60,0.15); border: 1px solid #ff3c3c;
      border-radius: 6px; color: #ff6b6b; font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui-root">
    <div id="menu-screen" class="screen">BrowserStrike — Menu</div>
    <div id="lobby-screen" class="screen" style="display:none">Lobby</div>
    <div id="playing-screen" class="screen" style="display:none"></div>
    <div id="match-end-screen" class="screen" style="display:none">Match End</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
